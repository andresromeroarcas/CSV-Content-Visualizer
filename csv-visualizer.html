<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Content Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            margin: 0;
        }

        .container {
            max-width: 98vw;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .upload-section {
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .file-input-wrapper:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .file-input {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            color: #64748b;
            display: none;
        }

        .content-section {
            padding: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-left: 4px solid #10b981;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #10b981;
        }

        .download-btn {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            width: 100%;
            overflow: auto;
            max-height: 70vh;
        }

        .table-header {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            padding: 20px;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            border-bottom: 2px solid #334155;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            position: sticky;
            top: 65px;
            z-index: 9;
            white-space: nowrap;
        }

        th:last-child {
            border-right: none;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid #e5e7eb;
            border-right: 1px solid #f1f5f9;
            vertical-align: top;
            line-height: 1.5;
            max-width: 300px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        td:last-child {
            border-right: none;
        }

        tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        tbody tr:hover {
            background: #f1f5f9;
        }

        .row-number {
            background: #e2e8f0;
            color: #64748b;
            font-weight: 600;
            text-align: center;
            width: 60px;
            min-width: 60px;
            position: sticky;
            left: 0;
            z-index: 8;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .delimiter-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        .delimiter-selector label {
            font-weight: 600;
            color: #374151;
        }

        .delimiter-selector select {
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1rem;
            background: white;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .upload-section, .content-section {
                padding: 20px;
            }
            
            .search-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-input {
                min-width: auto;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CSV Visualizer</h1>
            <p>Upload and visualize your CSV files with ease</p>
        </div>

        <div class="upload-section">
            <label for="fileInput" class="file-input-wrapper">
                📊 Choose CSV File
                <input type="file" id="fileInput" class="file-input" accept=".csv,.txt">
            </label>
            <div id="fileInfo" class="file-info"></div>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <div class="content-section">
            <div id="stats" class="stats" style="display: none;"></div>
            
            <div id="controlsContainer" style="display: none;">
                <div class="delimiter-selector">
                    <label for="delimiterSelect">Delimiter:</label>
                    <select id="delimiterSelect">
                        <option value="auto">Auto-detect</option>
                        <option value=",">Comma (,)</option>
                        <option value=";">Semicolon (;)</option>
                        <option value="\t">Tab</option>
                        <option value="|">Pipe (|)</option>
                    </select>
                </div>
                
                <div class="search-container">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search across all columns...">
                    <button id="downloadBtn" class="download-btn">📥 Download Filtered CSV</button>
                </div>
            </div>

            <div id="tableContainer" class="table-container" style="display: none;">
                <div class="table-header">CSV DATA</div>
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div id="emptyState" class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <h3>No CSV file loaded</h3>
                <p>Upload a CSV file to visualize its content in a clean table format</p>
            </div>
        </div>
    </div>

    <script>
        let csvData = [];
        let filteredData = [];
        let headers = [];
        let currentDelimiter = ',';

        document.getElementById('fileInput').addEventListener('change', handleFileSelect);
        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('delimiterSelect').addEventListener('change', handleDelimiterChange);
        document.getElementById('downloadBtn').addEventListener('click', downloadFilteredCSV);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const fileInfo = document.getElementById('fileInfo');
            const errorMessage = document.getElementById('errorMessage');
            
            fileInfo.innerHTML = `
                <strong>File:</strong> ${file.name}<br>
                <strong>Size:</strong> ${(file.size / 1024).toFixed(2)} KB<br>
                <strong>Type:</strong> ${file.type || 'Unknown'}
            `;
            fileInfo.style.display = 'block';
            errorMessage.style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    parseCSV(e.target.result);
                } catch (error) {
                    showError('Error reading file: ' + error.message);
                }
            };
            reader.readAsText(file);
        }

        function parseCSV(csvContent) {
            try {
                // Auto-detect delimiter
                const delimiters = [',', ';', '\t', '|'];
                let bestDelimiter = ',';
                let maxColumns = 0;

                if (document.getElementById('delimiterSelect').value === 'auto') {
                    delimiters.forEach(delimiter => {
                        const lines = csvContent.split('\n').slice(0, 5); // Check first 5 lines
                        let avgColumns = 0;
                        lines.forEach(line => {
                            if (line.trim()) {
                                avgColumns += line.split(delimiter).length;
                            }
                        });
                        avgColumns = avgColumns / lines.length;
                        
                        if (avgColumns > maxColumns) {
                            maxColumns = avgColumns;
                            bestDelimiter = delimiter;
                        }
                    });
                } else {
                    bestDelimiter = document.getElementById('delimiterSelect').value;
                    if (bestDelimiter === '\\t') bestDelimiter = '\t';
                }

                currentDelimiter = bestDelimiter;

                // Parse CSV with detected/selected delimiter
                const lines = csvContent.split('\n')
                    .map(line => line.trim())
                    .filter(line => line.length > 0);

                if (lines.length === 0) {
                    throw new Error('The CSV file appears to be empty');
                }

                // Parse headers
                headers = parseCSVLine(lines[0], bestDelimiter);
                
                // Parse data rows
                csvData = [];
                for (let i = 1; i < lines.length; i++) {
                    const rowData = parseCSVLine(lines[i], bestDelimiter);
                    if (rowData.some(cell => cell.trim() !== '')) { // Skip completely empty rows
                        csvData.push(rowData);
                    }
                }

                filteredData = [...csvData];
                renderTable();
                showStats();
                
                // Show controls and table
                document.getElementById('controlsContainer').style.display = 'block';
                document.getElementById('tableContainer').style.display = 'block';
                document.getElementById('emptyState').style.display = 'none';

            } catch (error) {
                showError('Error parsing CSV file: ' + error.message);
            }
        }

        function parseCSVLine(line, delimiter) {
            const cells = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"' && (i === 0 || line[i-1] === delimiter || line[i-1] === ' ')) {
                    inQuotes = true;
                } else if (char === '"' && inQuotes && (i === line.length - 1 || line[i+1] === delimiter)) {
                    inQuotes = false;
                } else if (char === delimiter && !inQuotes) {
                    cells.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            
            cells.push(current.trim());
            return cells;
        }

        function handleDelimiterChange() {
            if (document.getElementById('fileInput').files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    parseCSV(e.target.result);
                };
                reader.readAsText(document.getElementById('fileInput').files[0]);
            }
        }

        function renderTable() {
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            
            // Clear existing content
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            if (filteredData.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="${headers.length + 1}" style="text-align: center; color: #64748b; padding: 40px;">
                            No matching rows found
                        </td>
                    </tr>
                `;
                return;
            }

            // Create header row
            const headerRow = document.createElement('tr');
            
            // Add row number header
            const rowNumHeader = document.createElement('th');
            rowNumHeader.textContent = '#';
            rowNumHeader.className = 'row-number';
            headerRow.appendChild(rowNumHeader);

            // Add column headers
            headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header || 'Unnamed Column';
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            // Create data rows
            filteredData.forEach((row, index) => {
                const tr = document.createElement('tr');
                
                // Add row number
                const rowNumCell = document.createElement('td');
                rowNumCell.textContent = index + 1;
                rowNumCell.className = 'row-number';
                tr.appendChild(rowNumCell);

                // Add data cells
                headers.forEach((header, colIndex) => {
                    const td = document.createElement('td');
                    const cellContent = row[colIndex] || '';
                    td.textContent = cellContent;
                    
                    // Add title for long content
                    if (cellContent.length > 50) {
                        td.title = cellContent;
                    }
                    
                    tr.appendChild(td);
                });

                tableBody.appendChild(tr);
            });
        }

        function showStats() {
            const statsContainer = document.getElementById('stats');
            const totalRows = csvData.length;
            const totalColumns = headers.length;
            const nonEmptyRows = csvData.filter(row => 
                row.some(cell => cell && cell.trim() !== '')
            ).length;

            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalRows}</div>
                    <div class="stat-label">Total Rows</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalColumns}</div>
                    <div class="stat-label">Columns</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${nonEmptyRows}</div>
                    <div class="stat-label">Non-Empty Rows</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${currentDelimiter === '\t' ? 'Tab' : currentDelimiter}</div>
                    <div class="stat-label">Delimiter</div>
                </div>
            `;
            statsContainer.style.display = 'grid';
        }

        function handleSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (searchTerm === '') {
                filteredData = [...csvData];
            } else {
                filteredData = csvData.filter(row => 
                    row.some(cell => 
                        cell && cell.toString().toLowerCase().includes(searchTerm)
                    )
                );
            }
            
            renderTable();
        }

        function downloadFilteredCSV() {
            if (filteredData.length === 0) {
                alert('No data to download');
                return;
            }

            let csvContent = '';
            
            // Add headers
            csvContent += headers.map(header => `"${header}"`).join(currentDelimiter) + '\n';
            
            // Add filtered data
            filteredData.forEach(row => {
                csvContent += row.map(cell => `"${cell || ''}"`).join(currentDelimiter) + '\n';
            });

            // Create and download file
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', 'filtered_data.csv');
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }
    </script>
</body>
</html>
